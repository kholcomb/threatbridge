name: Security Triage

on:
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write        # claude-code-action posts PR comment
  id-token: write             # OIDC cloud auth (Bedrock / Vertex) if used
  security-events: write      # upload-sarif to GitHub Security tab

env:
  # Pinned ATT&CK version — must match ATTACK_VERSION in cve_intel/fetchers/attack_data.py.
  # Update both together when upgrading to a new ATT&CK release.
  ATTACK_VERSION: "ATT&CK-v18.1"

jobs:
  scan-and-triage:
    name: Scan → Gate → Narrative
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # -----------------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # -----------------------------------------------------------------------
      # Cache only the ATT&CK STIX bundle — content is immutable at a pinned
      # version tag so this is safe to cache indefinitely. NVD data is NOT
      # cached; it is always fetched fresh to avoid stale vulnerability scores.
      - name: Cache ATT&CK bundle
        uses: actions/cache@v4
        with:
          path: ~/.cache/cve-intel/attack
          key: attack-${{ env.ATTACK_VERSION }}

      # -----------------------------------------------------------------------
      - name: Install project dependencies
        run: pip install -e ".[dev]" --quiet

      # -----------------------------------------------------------------------
      - name: Preflight check
        run: cve-intel doctor
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      # -----------------------------------------------------------------------
      - name: Run Grype vulnerability scan
        uses: anchore/scan-action@v3
        with:
          path: "."
          output-format: json
          output-file: grype-results.json
          fail-build: false

      # -----------------------------------------------------------------------
      # Extract CVE IDs from Grype output into a plain list.
      # cve-intel batch accepts one CVE-ID per line.
      - name: Extract CVE IDs
        run: |
          jq -r '[.matches[].vulnerability.id | select(startswith("CVE-"))] | unique[]' \
            grype-results.json > cve-list.txt
          COUNT=$(wc -l < cve-list.txt | tr -d ' ')
          echo "Found ${COUNT} unique CVE(s)"
          echo "## Security Scan" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "$COUNT" -eq 0 ]; then
            echo "No CVE findings." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "**${COUNT} CVE(s) found by Grype** — running deterministic triage gate." >> "$GITHUB_STEP_SUMMARY"
          fi

      # -----------------------------------------------------------------------
      # Deterministic gate: no AI, no external API calls beyond NVD.
      # cve-intel batch fetches NVD and CISA Vulnrichment data and emits SARIF 2.1.0.
      # Level assignment uses CVSS score, KEV status, and SSVC exploitation signals.
      # Defaults: error = CVSS >= 9.0 OR KEV-listed OR SSVC exploitation=active.
      # Override thresholds via SARIF_POLICY_ARGS repo variable (see batch --help).
      # The gate fails if any result has level=error. Skip if no CVEs were found.
      - name: Deterministic SARIF gate
        if: env.FAIL_ON_CRITICAL != 'false'
        run: |
          if [ ! -s cve-list.txt ]; then
            echo "No CVEs to gate on — passing."
            exit 0
          fi

          mkdir -p sarif-results
          cve-intel batch cve-list.txt \
            --format sarif \
            --output sarif-results/ \
            --no-enrich \
            ${{ vars.SARIF_POLICY_ARGS }}

          CRITICAL_COUNT=$(jq '[.runs[].results[] | select(.level == "error")] | length' \
            sarif-results/results.sarif.json)

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Gate result:** ${CRITICAL_COUNT} critical (CVSS ≥ 9.0) finding(s)" >> "$GITHUB_STEP_SUMMARY"

          if [ "$CRITICAL_COUNT" -gt 0 ]; then
            echo "::error::${CRITICAL_COUNT} critical CVE(s) detected (CVSS ≥ 9.0) — review the Security tab."
            exit 1
          fi
        env:
          FAIL_ON_CRITICAL: ${{ vars.FAIL_ON_CRITICAL || 'true' }}
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

      # -----------------------------------------------------------------------
      # Upload SARIF to the GitHub Security tab (Dependency Review / Code Scanning).
      - name: Upload SARIF to GitHub Security tab
        if: always() && hashFiles('sarif-results/results.sarif.json') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: sarif-results/results.sarif.json
        continue-on-error: true

      # -----------------------------------------------------------------------
      # Advisory narrative from Claude — never fails CI.
      # Claude uses the MCP server to triage CVEs, cross-references the deployment
      # manifest, and posts a ranked PR comment with remediation steps.
      # The gate above has already made the pass/fail decision deterministically.
      - name: Claude advisory comment
        if: always() && hashFiles('cve-list.txt') != ''
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          prompt: |
            The file cve-list.txt contains CVE IDs found by Grype in this pull request.

            Step 1 — Triage: call batch_triage_cves with every CVE ID in cve-list.txt.

            Step 2 — Deployment context: if .security/deployment.yml exists, read it and
              use it to qualify which attack vectors are relevant to this deployment.
              If the file does not exist, skip deployment qualification entirely and note
              that in the comment.

            Step 3 — Post a PR comment with:
              - A ranked table of findings (CRITICAL → LOW) with CVSS score and priority tier
              - For each CRITICAL/HIGH: what the vulnerability enables, whether the attack
                vector is relevant given the deployment context, and a concrete remediation step
              - Any CVEs that were skipped (not found in NVD, reserved, etc.)
          github_token: ${{ secrets.GITHUB_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: "--mcp-config .mcp.ci.json --max-turns 10"

      # -----------------------------------------------------------------------
      - name: Upload scan artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-triage
          path: |
            grype-results.json
            cve-list.txt
            sarif-results/
          retention-days: 30
