name: Security Triage

on:
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write        # claude-code-action posts PR comment
  issues: write               # claude-code-action posts issue comment
  id-token: write             # OIDC cloud auth (Bedrock / Vertex) if used
  security-events: write      # upload-sarif to GitHub Security tab
  actions: read               # claude-code-action reads CI results

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

env:
  # Pinned ATT&CK version — must match ATTACK_VERSION in cve_intel/fetchers/attack_data.py.
  # Update both together when upgrading to a new ATT&CK release.
  ATTACK_VERSION: "ATT&CK-v18.1"
  # Artifact name shared between the scan and triage jobs.
  SCAN_ARTIFACT: scan-results

jobs:
  # -------------------------------------------------------------------------
  # Job 1: Scan — runs osv-scanner against uv.lock.
  # osv-scanner queries OSV.dev which aggregates NVD, GitHub Advisory Database,
  # and many other sources — broader coverage than Grype's internal DB alone.
  # Produces scan-results.sarif and uploads it as a workflow artifact for the
  # triage job. Swap this job out for any other SARIF-emitting scanner.
  scan:
    name: Scan dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Install osv-scanner
        run: |
          mkdir -p /tmp/osv-dl
          gh release download v2.3.5 \
            --repo google/osv-scanner \
            --pattern "osv-scanner_linux_amd64" \
            --pattern "osv-scanner_SHA256SUMS" \
            --dir /tmp/osv-dl
          (cd /tmp/osv-dl && sha256sum --check --ignore-missing osv-scanner_SHA256SUMS)
          install -m 755 /tmp/osv-dl/osv-scanner_linux_amd64 /usr/local/bin/osv-scanner
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Scan the resolved lockfile against OSV.dev — covers NVD, GitHub Advisory
      # Database, and ecosystem-specific advisories in a single query.
      # Exit code 1 = vulnerabilities found (expected); exit code 2+ = scanner error.
      - name: Scan uv.lock
        run: |
          osv-scanner scan --lockfile uv.lock --format sarif --output scan-results.sarif || {
            code=$?
            [ $code -eq 1 ] || exit $code
          }

      - name: Upload scan results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: ${{ env.SCAN_ARTIFACT }}
          path: scan-results.sarif
          retention-days: 30

  # -------------------------------------------------------------------------
  # Job 2: Triage — scanner-agnostic. Downloads the SARIF artifact produced
  # by the scan job (or any other job that uploads scan-results/scan-results.sarif)
  # and runs the deterministic gate + Claude advisory.
  triage:
    name: Security Gate
    needs: scan
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # -----------------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Download scan results
        uses: actions/download-artifact@cc203385981b70ca67e1cc392babf9cc229d5806  # v4.1.9
        with:
          name: ${{ env.SCAN_ARTIFACT }}

      # -----------------------------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.11"
          cache: 'pip'

      # -----------------------------------------------------------------------
      # Cache only the ATT&CK STIX bundle — content is immutable at a pinned
      # version tag so this is safe to cache indefinitely. NVD data is NOT
      # cached; it is always fetched fresh to avoid stale vulnerability scores.
      - name: Cache ATT&CK bundle
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7  # v5.0.4
        with:
          path: ~/.cache/cve-intel/attack
          key: attack-${{ env.ATTACK_VERSION }}

      # -----------------------------------------------------------------------
      - name: Install project dependencies
        run: pip install -e "." --quiet

      # -----------------------------------------------------------------------
      - name: Preflight check
        run: cve-intel doctor
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

      # -----------------------------------------------------------------------
      # Deterministic gate: feeds the scanner SARIF directly into cve-intel batch.
      # cve-intel auto-detects SARIF format, fetches NVD + CISA Vulnrichment data,
      # and emits an enriched SARIF 2.1.0.
      # Level assignment uses CVSS score, KEV status, and SSVC exploitation signals.
      # Defaults: error = CVSS >= 9.0 OR KEV-listed OR SSVC exploitation=active.
      # Override thresholds via SARIF_POLICY_ARGS repo variable (see batch --help).
      # NOTE: This step records findings but does NOT fail the job — the Enforce
      # gate step below does that after Claude has had a chance to comment.
      - name: Deterministic SARIF gate
        id: gate
        run: |
          mkdir -p sarif-results
          cve-intel batch scan-results.sarif \
            --format sarif \
            --output sarif-results/ \
            ${{ vars.SARIF_POLICY_ARGS }}

          if [ ! -f sarif-results/results.sarif.json ]; then
            echo "No CVE findings in scan results — passing."
            echo "total=0" >> "$GITHUB_OUTPUT"
            echo "critical_count=0" >> "$GITHUB_OUTPUT"
            echo "## Security Triage" >> "$GITHUB_STEP_SUMMARY"
            echo "No CVE findings." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          TOTAL=$(jq '[.runs[].results[]] | length' sarif-results/results.sarif.json)
          CRITICAL_COUNT=$(jq '[.runs[].results[] | select(.level == "error")] | length' \
            sarif-results/results.sarif.json)

          echo "total=${TOTAL}" >> "$GITHUB_OUTPUT"
          echo "critical_count=${CRITICAL_COUNT}" >> "$GITHUB_OUTPUT"
          echo "## Security Triage" >> "$GITHUB_STEP_SUMMARY"
          echo "**${TOTAL} CVE(s) found. Gate result:** ${CRITICAL_COUNT} critical (CVSS ≥ 9.0)" >> "$GITHUB_STEP_SUMMARY"
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

      # -----------------------------------------------------------------------
      # Upload enriched SARIF to the GitHub Security tab.
      - name: Upload SARIF to GitHub Security tab
        if: always() && hashFiles('sarif-results/results.sarif.json') != ''
        uses: github/codeql-action/upload-sarif@5c8a8a642e79153f5d047b10ec1cba1d1cc65699  # v3
        with:
          sarif_file: sarif-results/results.sarif.json
        continue-on-error: true

      # -----------------------------------------------------------------------
      # Build the CVE list for the advisory prompt.
      - name: Build CVE list
        id: cve_list
        if: always() && steps.gate.outputs.total != '0'
        run: |
          # Filter to CVE-* IDs only — osv-scanner also emits GHSA-* and PYSEC-*
          # which cve-intel cannot look up.
          CVE_IDS=$(jq -r '.runs[].results[].ruleId' sarif-results/results.sarif.json 2>/dev/null \
            | grep -E '^CVE-[0-9]{4}-[0-9]+$' | sort -u | tr '\n' ' ')
          echo "ids=${CVE_IDS}" >> "$GITHUB_OUTPUT"
          if [ -z "${CVE_IDS}" ]; then
            echo "No CVE IDs found in scan results (findings may be GHSA/PYSEC only)."
          fi

      # -----------------------------------------------------------------------
      # Post an @claude mention comment so the Claude Code workflow (claude.yml)
      # picks it up and generates the advisory using the cve-intel MCP server.
      # That workflow already has Python deps and MCP config installed and is not
      # subject to the oauth token workflow-file validation restriction that blocked
      # the inline claude-code-action approach.
      # Only runs on pull_request events — workflow_dispatch has no PR to comment on.
      - name: Request Claude advisory via PR comment
        if: always() && github.event_name == 'pull_request' && steps.gate.outputs.total != '0' && steps.cve_list.outputs.ids != ''
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          TOTAL: ${{ steps.gate.outputs.total }}
          CRITICAL: ${{ steps.gate.outputs.critical_count }}
          CVE_IDS: ${{ steps.cve_list.outputs.ids }}
        run: |
          BODY=$(printf '@claude Security scan complete — **%s critical** / **%s total** CVE(s) found.\n\nUse the cve-intel MCP server to generate a security advisory:\n1. Call `batch_triage_cves` with: %s\n2. For each CRITICAL/HIGH finding call `lookup_technique` and `get_community_sigma_rules`\n3. Reply with a ranked findings table, ATT&CK mapping, detection coverage, and exact remediation (package → fixed version)\n\n_Posted automatically by the Security Triage workflow._' \
            "${CRITICAL}" "${TOTAL}" "${CVE_IDS}")
          gh pr comment "${PR_NUMBER}" --body "${BODY}"

      # -----------------------------------------------------------------------
      - name: Upload triage artifacts
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: security-triage
          path: sarif-results/
          retention-days: 30

      # -----------------------------------------------------------------------
      # Warn gate — reports critical findings as a warning but does not fail
      # the job. Re-enable blocking by setting FAIL_ON_CRITICAL=true repo var.
      - name: Warn gate
        if: always() && steps.gate.outputs.critical_count != '' && steps.gate.outputs.critical_count != '0'
        run: |
          echo "::warning::${{ steps.gate.outputs.critical_count }} critical CVE(s) detected (CVSS ≥ 9.0) — review the Security tab and Claude advisory above."
