name: Security Triage

on:
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write        # claude-code-action posts PR comment
  id-token: write             # OIDC cloud auth (Bedrock / Vertex) if used
  security-events: write      # upload-sarif to GitHub Security tab

env:
  # Pinned ATT&CK version — must match ATTACK_VERSION in cve_intel/fetchers/attack_data.py.
  # Update both together when upgrading to a new ATT&CK release.
  ATTACK_VERSION: "ATT&CK-v18.1"

jobs:
  scan-and-triage:
    name: Scan → Gate → Narrative
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # -----------------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # -----------------------------------------------------------------------
      # Cache only the ATT&CK STIX bundle — content is immutable at a pinned
      # version tag so this is safe to cache indefinitely. NVD data is NOT
      # cached; it is always fetched fresh to avoid stale vulnerability scores.
      - name: Cache ATT&CK bundle
        uses: actions/cache@v4
        with:
          path: ~/.cache/cve-intel/attack
          key: attack-${{ env.ATTACK_VERSION }}

      # -----------------------------------------------------------------------
      - name: Install project dependencies
        run: pip install -e ".[dev]" --quiet

      # -----------------------------------------------------------------------
      - name: Preflight check
        run: cve-intel doctor
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

      # -----------------------------------------------------------------------
      - name: Install Grype
        run: curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Run Grype vulnerability scan
        run: grype dir:. --output json --file grype-results.json || true

      # -----------------------------------------------------------------------
      # Extract CVE IDs from Grype output into a plain list.
      # cve-intel batch accepts one CVE-ID per line.
      - name: Extract CVE IDs
        run: |
          jq -r '[.matches[].vulnerability.id | select(startswith("CVE-"))] | unique[]' \
            grype-results.json > cve-list.txt
          COUNT=$(wc -l < cve-list.txt | tr -d ' ')
          echo "Found ${COUNT} unique CVE(s)"
          echo "## Security Scan" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "$COUNT" -eq 0 ]; then
            echo "No CVE findings." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "**${COUNT} CVE(s) found by Grype** — running deterministic triage gate." >> "$GITHUB_STEP_SUMMARY"
          fi

      # -----------------------------------------------------------------------
      # Deterministic gate: no AI, no external API calls beyond NVD.
      # cve-intel batch fetches NVD and CISA Vulnrichment data and emits SARIF 2.1.0.
      # Level assignment uses CVSS score, KEV status, and SSVC exploitation signals.
      # Defaults: error = CVSS >= 9.0 OR KEV-listed OR SSVC exploitation=active.
      # Override thresholds via SARIF_POLICY_ARGS repo variable (see batch --help).
      # The gate fails if any result has level=error. Skip if no CVEs were found.
      - name: Deterministic SARIF gate
        if: env.FAIL_ON_CRITICAL != 'false'
        run: |
          if [ ! -s cve-list.txt ]; then
            echo "No CVEs to gate on — passing."
            exit 0
          fi

          mkdir -p sarif-results
          cve-intel batch cve-list.txt \
            --format sarif \
            --output sarif-results/ \
            --no-enrich \
            ${{ vars.SARIF_POLICY_ARGS }}

          CRITICAL_COUNT=$(jq '[.runs[].results[] | select(.level == "error")] | length' \
            sarif-results/results.sarif.json)

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Gate result:** ${CRITICAL_COUNT} critical (CVSS ≥ 9.0) finding(s)" >> "$GITHUB_STEP_SUMMARY"

          if [ "$CRITICAL_COUNT" -gt 0 ]; then
            echo "::error::${CRITICAL_COUNT} critical CVE(s) detected (CVSS ≥ 9.0) — review the Security tab."
            exit 1
          fi
        env:
          FAIL_ON_CRITICAL: ${{ vars.FAIL_ON_CRITICAL || 'true' }}
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

      # -----------------------------------------------------------------------
      # Upload SARIF to the GitHub Security tab (Dependency Review / Code Scanning).
      - name: Upload SARIF to GitHub Security tab
        if: always() && hashFiles('sarif-results/results.sarif.json') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: sarif-results/results.sarif.json
        continue-on-error: true

      # -----------------------------------------------------------------------
      # Advisory narrative from Claude — never fails CI.
      # Claude uses the cve-intel MCP server to triage CVEs with full ATT&CK
      # mapping and detection context, then posts a ranked PR comment.
      # The gate above has already made the pass/fail decision deterministically.
      - name: Claude advisory comment
        if: always() && hashFiles('cve-list.txt') != ''
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          prompt: |
            You have access to the cve-intel MCP server. Use it to produce a
            security advisory comment for this pull request.

            ## Inputs available to you
            - grype-results.json — raw Grype scan output (vulnerability matches
              with package name, installed version, and fix version per finding)
            - cve-list.txt — deduplicated CVE IDs extracted from grype-results.json
            - .security/deployment.yml — optional deployment manifest describing
              network exposure, auth model, and runtime environment

            ## Steps

            1. Read grype-results.json to build a map of CVE ID → package context
               (name, installed version, fix version).

            2. Call batch_triage_cves with all CVE IDs from cve-list.txt.
               This returns priority tier, KEV/SSVC exploitation status, ATT&CK
               techniques, attack requirements, and impact scope for each CVE.

            3. For each CRITICAL or HIGH finding:
               a. Call lookup_technique for each mapped ATT&CK technique to get
                  the full technique description, targeted platforms, and data sources.
               b. Call get_community_sigma_rules (passing technique_ids) to check
                  whether detection rules exist for the techniques involved.

            4. If .security/deployment.yml exists, read it and use attack_requirements
               from the triage results to qualify which findings are actually reachable
               given the deployment's network exposure and auth model.
               If the file does not exist, note this and skip qualification.

            5. Post a single PR comment structured as follows:

            ### Security Scan — [N critical / N high / N medium / N low]

            A ranked table of all findings:
            | CVE | Package | Installed → Fix | Priority | CVSS | KEV |
            Each row links the CVE ID to nvd.nist.gov.

            For each CRITICAL and HIGH finding, a sub-section with:
            - What the vulnerability enables (plain English, 1–2 sentences)
            - ATT&CK techniques involved and what stage of the kill chain they map to
            - Whether the attack vector is relevant given deployment context
            - Detection coverage: whether community Sigma rules exist for the techniques
            - Concrete remediation: exact package upgrade with version

            A final section listing any CVEs that could not be triaged (not found,
            reserved, or rate-limited) for manual review.
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--mcp-config .mcp.ci.json --max-turns 25"

      # -----------------------------------------------------------------------
      - name: Upload scan artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-triage
          path: |
            grype-results.json
            cve-list.txt
            sarif-results/
          retention-days: 30
