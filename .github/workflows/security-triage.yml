name: Security Triage

on:
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write        # claude-code-action posts PR comment
  id-token: write             # OIDC cloud auth (Bedrock / Vertex) if used
  security-events: write      # upload-sarif to GitHub Security tab

env:
  # Pinned ATT&CK version — must match ATTACK_VERSION in cve_intel/fetchers/attack_data.py.
  # Update both together when upgrading to a new ATT&CK release.
  ATTACK_VERSION: "ATT&CK-v18.1"
  # Artifact name shared between the scan and triage jobs.
  SCAN_ARTIFACT: scan-results

jobs:
  # -------------------------------------------------------------------------
  # Job 1: Scan — runs osv-scanner against uv.lock.
  # osv-scanner queries OSV.dev which aggregates NVD, GitHub Advisory Database,
  # and many other sources — broader coverage than Grype's internal DB alone.
  # Produces scan-results.sarif and uploads it as a workflow artifact for the
  # triage job. Swap this job out for any other SARIF-emitting scanner.
  scan:
    name: Scan dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install osv-scanner
        run: |
          gh release download v2.3.5 \
            --repo google/osv-scanner \
            --pattern "osv-scanner_linux_amd64" \
            --dir /usr/local/bin
          chmod +x /usr/local/bin/osv-scanner_linux_amd64
          ln -s /usr/local/bin/osv-scanner_linux_amd64 /usr/local/bin/osv-scanner
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Scan the resolved lockfile against OSV.dev — covers NVD, GitHub Advisory
      # Database, and ecosystem-specific advisories in a single query.
      - name: Scan uv.lock
        run: osv-scanner scan --lockfile uv.lock --format sarif --output scan-results.sarif || true

      - name: Upload scan results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: ${{ env.SCAN_ARTIFACT }}
          path: scan-results.sarif
          retention-days: 30

  # -------------------------------------------------------------------------
  # Job 2: Triage — scanner-agnostic. Downloads the SARIF artifact produced
  # by the scan job (or any other job that uploads scan-results/scan-results.sarif)
  # and runs the deterministic gate + Claude advisory.
  triage:
    name: Gate → Narrative
    needs: scan
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # -----------------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Download scan results
        uses: actions/download-artifact@cc203385981b70ca67e1cc392babf9cc229d5806  # v4.1.9
        with:
          name: ${{ env.SCAN_ARTIFACT }}

      # -----------------------------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.11"

      # -----------------------------------------------------------------------
      # Cache only the ATT&CK STIX bundle — content is immutable at a pinned
      # version tag so this is safe to cache indefinitely. NVD data is NOT
      # cached; it is always fetched fresh to avoid stale vulnerability scores.
      - name: Cache ATT&CK bundle
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7  # v5.0.4
        with:
          path: ~/.cache/cve-intel/attack
          key: attack-${{ env.ATTACK_VERSION }}

      # -----------------------------------------------------------------------
      - name: Install project dependencies
        run: pip install -e ".[dev]" --quiet

      # -----------------------------------------------------------------------
      - name: Preflight check
        run: cve-intel doctor
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

      # -----------------------------------------------------------------------
      # Deterministic gate: feeds the scanner SARIF directly into cve-intel batch.
      # cve-intel auto-detects SARIF format, fetches NVD + CISA Vulnrichment data,
      # and emits an enriched SARIF 2.1.0.
      # Level assignment uses CVSS score, KEV status, and SSVC exploitation signals.
      # Defaults: error = CVSS >= 9.0 OR KEV-listed OR SSVC exploitation=active.
      # Override thresholds via SARIF_POLICY_ARGS repo variable (see batch --help).
      # The gate fails if any result has level=error.
      - name: Deterministic SARIF gate
        id: gate
        if: env.FAIL_ON_CRITICAL != 'false'
        run: |
          mkdir -p sarif-results
          cve-intel batch scan-results.sarif \
            --format sarif \
            --output sarif-results/ \
            --no-enrich \
            ${{ vars.SARIF_POLICY_ARGS }}

          if [ ! -f sarif-results/results.sarif.json ]; then
            echo "No CVE findings in scan results — passing."
            echo "total=0" >> "$GITHUB_OUTPUT"
            echo "## Security Triage" >> "$GITHUB_STEP_SUMMARY"
            echo "No CVE findings." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          TOTAL=$(jq '[.runs[].results[]] | length' sarif-results/results.sarif.json)
          CRITICAL_COUNT=$(jq '[.runs[].results[] | select(.level == "error")] | length' \
            sarif-results/results.sarif.json)

          echo "total=${TOTAL}" >> "$GITHUB_OUTPUT"
          echo "## Security Triage" >> "$GITHUB_STEP_SUMMARY"
          echo "**${TOTAL} CVE(s) found. Gate result:** ${CRITICAL_COUNT} critical (CVSS ≥ 9.0)" >> "$GITHUB_STEP_SUMMARY"

          if [ "$CRITICAL_COUNT" -gt 0 ]; then
            echo "::error::${CRITICAL_COUNT} critical CVE(s) detected (CVSS ≥ 9.0) — review the Security tab."
            exit 1
          fi
        env:
          FAIL_ON_CRITICAL: ${{ vars.FAIL_ON_CRITICAL || 'true' }}
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

      # -----------------------------------------------------------------------
      # Upload enriched SARIF to the GitHub Security tab.
      - name: Upload SARIF to GitHub Security tab
        if: always() && hashFiles('sarif-results/results.sarif.json') != ''
        uses: github/codeql-action/upload-sarif@5c8a8a642e79153f5d047b10ec1cba1d1cc65699  # v3
        with:
          sarif_file: sarif-results/results.sarif.json
        continue-on-error: true

      # -----------------------------------------------------------------------
      # Advisory narrative from Claude — never fails CI.
      # Claude uses the cve-intel MCP server to triage CVEs with full ATT&CK
      # mapping and detection context, then posts a ranked PR comment.
      # The gate above has already made the pass/fail decision deterministically.
      - name: Claude advisory comment
        if: always() && steps.gate.outputs.total != '0'
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          prompt: |
            You have access to the cve-intel MCP server. Use it to produce a
            security advisory comment for this pull request.

            ## Inputs available to you
            - scan-results.sarif — scanner output in SARIF 2.1.0 format.
              Package context (name, installed version, fix version) is in
              results[].locations[].logicalLocations[] and results[].message.text.
            - sarif-results/results.sarif.json — enriched SARIF produced by cve-intel,
              with priority tier, CVSS score, KEV status, and ATT&CK technique IDs per finding.
            - .security/deployment.yml — optional deployment manifest describing
              network exposure, auth model, and runtime environment

            ## Steps

            1. Read sarif-results/results.sarif.json to get the full enriched finding list.
               Cross-reference scan-results.sarif to add package context (name, installed
               version, fix version) for each CVE ID.

            2. Call batch_triage_cves with all CVE IDs from sarif-results/results.sarif.json.
               This returns priority tier, KEV/SSVC exploitation status, ATT&CK
               techniques, attack requirements, and impact scope for each CVE.

            3. For each CRITICAL or HIGH finding:
               a. Call lookup_technique for each mapped ATT&CK technique to get
                  the full technique description, targeted platforms, and data sources.
               b. Call get_community_sigma_rules (passing technique_ids) to check
                  whether detection rules exist for the techniques involved.

            4. If .security/deployment.yml exists, read it and use attack_requirements
               from the triage results to qualify which findings are actually reachable
               given the deployment's network exposure and auth model.
               If the file does not exist, note this and skip qualification.

            5. Post a single PR comment structured as follows:

            ### Security Scan — [N critical / N high / N medium / N low]

            A ranked table of all findings:
            | CVE | Package | Installed → Fix | Priority | CVSS | KEV |
            Each row links the CVE ID to nvd.nist.gov.

            For each CRITICAL and HIGH finding, a sub-section with:
            - What the vulnerability enables (plain English, 1–2 sentences)
            - ATT&CK techniques involved and what stage of the kill chain they map to
            - Whether the attack vector is relevant given deployment context
            - Detection coverage: whether community Sigma rules exist for the techniques
            - Concrete remediation: exact package upgrade with version

            A final section listing any CVEs that could not be triaged (not found,
            reserved, or rate-limited) for manual review.
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--mcp-config .mcp.ci.json --max-turns 25"

      # -----------------------------------------------------------------------
      - name: Upload triage artifacts
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: security-triage
          path: sarif-results/
          retention-days: 30
